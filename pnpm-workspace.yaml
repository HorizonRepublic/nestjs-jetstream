packages:
  - 'website'

allowBuilds:
  '@nestjs/core': false
  core-js: false
  cpu-features: false
  esbuild: true
  msgpackr-extract: false
  protobufjs: false
  ssh2: false

# Security floors for transitive deps (Dependabot advisories). Drop an entry
# once the parent chain resolves a patched version on its own.
overrides:
  vite: 8.1.3
  'qs@>=6.11.1 <6.15.2': 6.15.3
  ws: ^8.21.0
  'serialize-javascript@>=5.0.0 <7.0.5': ^7.0.7
